<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Conexão Motos - Gestão de Oficina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    {% load static %}
    <link href="{% static 'oficina/app.css' %}" rel="stylesheet">
    <style>
        body {
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        }
    </style>
</head>

<body>
    <div class="container-fluid py-3">
        <div class="cm-shell">
            <aside class="cm-sidebar">
                <div class="cm-brand">
                    <div class="cm-badge" aria-hidden="true"></div>
                    <div>
                        <div class="cm-brand-title">Conexão Motos</div>
                        <div class="cm-brand-subtitle">Gestão de Oficina</div>
                    </div>
                </div>

                <nav class="nav flex-column cm-nav">
                    <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"
                        href="{% url 'dashboard' %}">Dashboard</a>
                    <a class="nav-link {% if 'cliente' in request.resolver_match.url_name %}active{% endif %}"
                        href="{% url 'cliente_list' %}">Clientes</a>
                    <a class="nav-link {% if 'moto' in request.resolver_match.url_name %}active{% endif %}"
                        href="{% url 'moto_list' %}">Motos</a>
                    <a class="nav-link {% if 'peca' in request.resolver_match.url_name %}active{% endif %}"
                        href="{% url 'peca_list' %}">Peças / Estoque</a>
                    <a class="nav-link {% if 'servico' in request.resolver_match.url_name %}active{% endif %}"
                        href="{% url 'servico_list' %}">Serviços</a>
                    <a class="nav-link {% if request.resolver_match.url_name|default:''|slice:':2' == 'os' %}active{% endif %}"
                        href="{% url 'os_list' %}">Ordens de Serviço</a>
                    <a class="nav-link {% if request.resolver_match.url_name == 'relatorios' %}active{% endif %}"
                        href="{% url 'relatorios' %}">Relatórios</a>
                </nav>

                <div class="mt-3 small text-white-50">
                    <div>Atalho: `admin/`</div>
                </div>
            </aside>

            <main class="cm-main">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function () {
            function onlyDigits(value) {
                return (value || "").replace(/\D/g, "");
            }

            function maskCPF(value) {
                const v = onlyDigits(value).slice(0, 11);
                const parts = [];
                if (v.length > 3) {
                    parts.push(v.slice(0, 3));
                    if (v.length > 6) {
                        parts.push(v.slice(3, 6));
                        parts.push(v.slice(6, 9));
                    } else {
                        parts.push(v.slice(3));
                    }
                } else {
                    return v;
                }
                let rest = v.slice(9);
                let base = parts.join(".");
                if (rest.length) {
                    base += "-" + rest;
                }
                return base;
            }

            function maskCEP(value) {
                const v = onlyDigits(value).slice(0, 8);
                if (v.length <= 5) return v;
                return v.slice(0, 5) + "-" + v.slice(5);
            }

            function maskTelefone(value) {
                const v = onlyDigits(value).slice(0, 11);
                if (!v) return "";
                const ddd = v.slice(0, 2);
                if (v.length <= 6) {
                    return "(" + ddd + ") " + v.slice(2);
                }
                if (v.length === 10) {
                    return "(" + ddd + ") " + v.slice(2, 6) + "-" + v.slice(6);
                }
                return "(" + ddd + ") " + v.slice(2, 7) + "-" + v.slice(7);
            }

            function attachMask(selector, fn) {
                document.querySelectorAll(selector).forEach(function (input) {
                    input.addEventListener("input", function (e) {
                        const caret = e.target.selectionStart;
                        const original = e.target.value;
                        const masked = fn(original);
                        e.target.value = masked;
                    });
                });
            }

            window.addEventListener("DOMContentLoaded", function () {
                attachMask('input[name="cpf"]', maskCPF);
                attachMask('input[name="cep"]', maskCEP);
                attachMask('input[name="telefone"]', maskTelefone);
            });
        })();
    </script>
    {% block extra_js %}{% endblock %}
</body>

</html>
